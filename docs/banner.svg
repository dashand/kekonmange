<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED"/>
      <stop offset="100%" style="stop-color:#FFEDD5"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>

  <!-- Decorative circles (food dots) -->
  <circle cx="50" cy="40" r="8" fill="#FDBA74" opacity="0.3"/>
  <circle cx="120" cy="270" r="12" fill="#FB923C" opacity="0.2"/>
  <circle cx="1100" cy="60" r="10" fill="#FDBA74" opacity="0.3"/>
  <circle cx="1150" cy="240" r="6" fill="#FB923C" opacity="0.2"/>
  <circle cx="300" cy="30" r="5" fill="#F97316" opacity="0.15"/>
  <circle cx="900" cy="275" r="7" fill="#F97316" opacity="0.15"/>

  <!-- Left group: people sharing food -->
  <!-- Person 1 (left) -->
  <g transform="translate(80, 100)">
    <!-- Head -->
    <circle cx="30" cy="20" r="18" fill="#FB923C" opacity="0.8"/>
    <!-- Body -->
    <rect x="14" y="40" width="32" height="45" rx="12" fill="#FB923C" opacity="0.6"/>
    <!-- Arm reaching right with fork -->
    <line x1="46" y1="55" x2="85" y2="45" stroke="#FB923C" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Fork -->
    <g transform="translate(82, 32) rotate(20)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#EA580C" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-4" y1="0" x2="-4" y2="8" stroke="#EA580C" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="#EA580C" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Shared plate (center-left) -->
  <g transform="translate(175, 135)">
    <ellipse cx="35" cy="25" rx="35" ry="12" fill="#FED7AA" stroke="#FDBA74" stroke-width="1.5"/>
    <!-- Food items on plate -->
    <circle cx="22" cy="20" r="6" fill="#F97316" opacity="0.7"/>
    <circle cx="38" cy="18" r="5" fill="#EA580C" opacity="0.6"/>
    <circle cx="30" cy="24" r="4" fill="#FB923C" opacity="0.8"/>
  </g>

  <!-- Person 2 (center-left) -->
  <g transform="translate(220, 100)">
    <circle cx="30" cy="20" r="18" fill="#EA580C" opacity="0.7"/>
    <rect x="14" y="40" width="32" height="45" rx="12" fill="#EA580C" opacity="0.5"/>
    <!-- Arm reaching left -->
    <line x1="14" y1="55" x2="-20" y2="50" stroke="#EA580C" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Map pin with heart (between people and text) -->
  <g transform="translate(310, 80)">
    <path d="M20 0C8.95 0 0 8.95 0 20c0 15 20 32 20 32s20-17 20-32C40 8.95 31.05 0 20 0z" fill="#F97316" opacity="0.8"/>
    <text x="20" y="24" text-anchor="middle" font-size="16" fill="white">♥</text>
  </g>

  <!-- Title -->
  <text x="600" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" letter-spacing="-1">
    <tspan fill="#1F2937">Kekon</tspan><tspan fill="#F97316">Mange</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9CA3AF" font-weight="500">
    Partagez les bonnes adresses entre collègues pour manger à midi
  </text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="280" y="175" width="140" height="32" rx="16" fill="white" stroke="#FDBA74" stroke-width="1"/>
  <text x="306" y="196" font-family="system-ui, sans-serif" font-size="11" fill="#EA580C" font-weight="600">🍽️ Fiches resto</text>

  <!-- Pill 2 -->
  <rect x="435" y="175" width="150" height="32" rx="16" fill="white" stroke="#FDBA74" stroke-width="1"/>
  <text x="461" y="196" font-family="system-ui, sans-serif" font-size="11" fill="#EA580C" font-weight="600">🎰 Roulette repas</text>

  <!-- Pill 3 -->
  <rect x="600" y="175" width="140" height="32" rx="16" fill="white" stroke="#FDBA74" stroke-width="1"/>
  <text x="626" y="196" font-family="system-ui, sans-serif" font-size="11" fill="#EA580C" font-weight="600">👥 Collaboratif</text>

  <!-- Pill 4 -->
  <rect x="755" y="175" width="160" height="32" rx="16" fill="white" stroke="#FDBA74" stroke-width="1"/>
  <text x="781" y="196" font-family="system-ui, sans-serif" font-size="11" fill="#EA580C" font-weight="600">🗺️ Plans & itinéraires</text>

  <!-- Right decorative group: food emojis floating -->
  <text x="1020" y="90" font-size="28" opacity="0.4" transform="rotate(-15, 1020, 90)">🥐</text>
  <text x="1080" y="140" font-size="24" opacity="0.35" transform="rotate(10, 1080, 140)">🍕</text>
  <text x="1040" y="200" font-size="26" opacity="0.3" transform="rotate(-5, 1040, 200)">🍣</text>
  <text x="1110" y="230" font-size="22" opacity="0.35" transform="rotate(12, 1110, 230)">🥗</text>
  <text x="1070" y="60" font-size="20" opacity="0.3" transform="rotate(-8, 1070, 60)">🍔</text>
  <text x="1130" y="170" font-size="18" opacity="0.25">🌮</text>

  <!-- Bottom tagline -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D1D5DB" font-weight="400" letter-spacing="3">
    OPEN SOURCE · AGPL-3.0 · REACT + POCKETBASE
  </text>
</svg>
